<!DOCTYPE html>
<!-- DOCTYPE tells the browser this is a modern HTML5 document -->
<html lang="en">
  <head>
    <!-- charset ensures special characters display correctly -->
    <meta charset="UTF-8" />
    <!-- viewport makes the page look good on mobile phones -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo App</title>
    <!-- Link to our CSS file — the browser will request this from the server -->
    <!-- Express serves it automatically from the /public folder -->
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- Main wrapper — centers everything on the page -->
    <div class="container">

      <!-- App Header -->
      <div class="header">
        <h1 class="title">📝 My Todo App</h1>
        <p class="subtitle">Stay organized, stay productive</p>
      </div>

      <!-- Input Section -->
      <!-- This is where the user types a new todo and clicks Add -->
      <div class="input-section">
        <input
          type="text"
          id="todoInput"
          class="todo-input"
          placeholder="What needs to be done?"
          maxlength="200"
        />
        <button id="addBtn" class="btn btn-add">Add Todo</button>
      </div>

      <!-- Stats Bar -->
      <!-- Shows how many todos are total and how many are completed -->
      <div class="stats-bar">
        <span id="totalCount">0 todos</span>
        <span id="completedCount">0 completed</span>
      </div>

      <!-- Todo List -->
      <!-- This div is EMPTY in HTML — JavaScript will fill it dynamically -->
      <!-- Each todo item will be created and inserted here by script.js -->
      <div id="todoList" class="todo-list">
        <!-- Todo items are inserted here by JavaScript -->
      </div>

      <!-- Empty State Message -->
      <!-- Shown when there are no todos. Hidden by JavaScript when todos exist -->
      <div id="emptyState" class="empty-state">
        <p>🎉 No todos yet! Add one above.</p>
      </div>

    </div>
    <!-- End of .container -->

    <!-- Link to our JavaScript file -->
    <!-- Placed at the BOTTOM of body — this ensures the HTML above is
         fully loaded before the script runs. If we put this in <head>,
         the script would run before the elements exist, causing errors. -->
    <script src="script.js"></script>
  </body>
</html>
